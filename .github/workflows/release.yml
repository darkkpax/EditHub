name: Release EditHub

# Push a tag like v1.0.1 to trigger a build + publish to GitHub Releases.
# The desktop app picks the new version up automatically on next launch.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: windows/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
