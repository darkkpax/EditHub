name: EditHub
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_LANGUAGE: en
    CODE_SIGN_STYLE: Automatic
    # Локальная разработка без платного Apple Team — ad-hoc подпись.
    CODE_SIGN_IDENTITY: "-"

targets:
  EditHub:
    type: application
    platform: macOS
    sources:
      - path: Sources/EditHub
    info:
      path: App/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "26.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        # Тип документа: файл-манифест законсервированного проекта (.edithub)
        CFBundleDocumentTypes:
          - CFBundleTypeName: EditHub Project Manifest
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.local.EditHub.manifest
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.local.EditHub.manifest
            UTTypeDescription: EditHub Project Manifest
            UTTypeConformsTo:
              - public.json
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - edithub
    entitlements:
      path: App/EditHub.entitlements
      properties:
        # Локальная dev-сборка без iCloud (не требует платного Team).
        # Для дистрибутива с iCloud — Packaging/macOS/EditHub.entitlements.
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.EditHub
        PRODUCT_NAME: EditHub
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
